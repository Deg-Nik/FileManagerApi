spring.application.name=File Manager API
# Server
server.port=8080

# Database - H2
spring.datasource.url=jdbc:h2:mem:filedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# File Storage
app.upload.directory=./uploads
app.upload.avatars=${app.upload.directory}/avatars
app.upload.documents=${app.upload.directory}/documents
app.upload.images=${app.upload.directory}/images
app.upload.thumbnails=${app.upload.directory}/thumbnails

# Thumbnail Settings
app.thumbnail.width=200
app.thumbnail.height=200